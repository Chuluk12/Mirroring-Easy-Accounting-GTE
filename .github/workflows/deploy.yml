name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to NetBird
        run: |
          curl -fsSL https://pkgs.netbird.io/install.sh | sh
          sudo netbird up \
            --setup-key "${{ secrets.NETBIRD_SETUP_KEY }}" \
            --hostname "github-actions-deploy" \
            --management-url "https://api.netbird.io:443"

      - name: Wait NetBird
        run: |
          sleep 15
          netbird status
          ping -c 5 ${{ secrets.SERVER_HOST }} || true

      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh

          cat > ~/.ssh/id_ed25519 << 'EOF'
          ${{ secrets.SERVER_SSH_KEY }}
          EOF

          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} << 'EOF'
              cd ~/repositories/Mirroring-Easy-Accounting-GTE
              git pull origin main
              docker compose up -d --build
          EOF
