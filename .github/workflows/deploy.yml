name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Connect to NetBird
        uses: Alemiz112/netbird-connect@v1.0.1
        with:
          setup-key: ${{ secrets.NETBIRD_SETUP_KEY }}
          hostname: github-actions-deploy
          management-url: https://api.netbird.io:443

      - name: Wait for NetBird
        run: |
          sleep 10
          netbird status
          ping -c 3 ${{ secrets.SERVER_HOST }} || true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 60s
          command_timeout: 25m
          script: |
            cd ~/repositories/Mirroring-Easy-Accounting-GTE
            git pull origin main
            docker compose up -d --build
