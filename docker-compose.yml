services:
  backend:
    build: 
      context: ./backend
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN apt-get update && apt-get install -y --no-install-recommends libfbclient2 curl \
            && FBCLIENT="$$(find /usr/lib -name libfbclient.so.2 -print -quit)" \
            && test -n "$$FBCLIENT" \
            && ln -s "$$FBCLIENT" /usr/local/lib/libfbclient.so.2 \
            && rm -rf /var/lib/apt/lists/*
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        EXPOSE 5000
        CMD ["python", "server.py"]
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    environment:
      EASY_FBCLIENT_PATH: /usr/local/lib/libfbclient.so.2
      EASY_BACKEND_PORT: "5000"
      APP_DB_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        RUN npm install -g pnpm
        COPY package*.json pnpm-lock.yaml* ./
        RUN pnpm install
        COPY . .
        RUN pnpm run build
        EXPOSE 4175
        CMD ["pnpm", "run", "preview", "--", "--host", "0.0.0.0", "--port", "4175"]
    ports:
      - "4175:4175" # Preview port
    env_file:
      - ./frontend/.env
    restart: unless-stopped
    depends_on:
      - nginx
