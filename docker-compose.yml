services:
  backend:
    build: 
      context: ./backend
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN apt-get update && apt-get install -y gcc firebird-dev firebird3.0-utils curl && rm -rf /var/lib/apt/lists/*
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        EXPOSE 5000
        CMD ["python", "server.py"]
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    environment:
      EASY_FBCLIENT_PATH: libfbclient.so.2
      EASY_BACKEND_PORT: "5000"
      APP_DB_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        RUN npm install -g pnpm
        COPY package*.json pnpm-lock.yaml* ./
        RUN pnpm install
        COPY . .
        EXPOSE 4175 5175
        CMD ["pnpm", "run", "dev", "--", "--host", "--force"]
    ports:
      - "4175:4175" # Preview port
      - "5175:5175" # Dev port
    env_file:
      - ./frontend/.env
    restart: unless-stopped
    depends_on:
      - nginx
