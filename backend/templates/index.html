<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Stock Dashboard - Easy Accounting</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .header { background: #1a73e8; color: white; padding: 16px 24px; }
        .header h1 { font-size: 20px; }
        .status { font-size: 12px; margin-top: 4px; opacity: 0.8; }
        .container { padding: 24px; }
        .search-box { width: 100%; padding: 10px 16px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; background: white;
            border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th { background: #1a73e8; color: white; padding: 12px 16px;
            text-align: left; font-size: 13px; }
        td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
        tr:hover td { background: #f8f9ff; }
        .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .badge-BJ { background: #e8f5e9; color: #2e7d32; }
        .badge-BB { background: #fff3e0; color: #e65100; }
        .badge-BBP { background: #e3f2fd; color: #1565c0; }
        .badge-BSJ { background: #f3e5f5; color: #6a1b9a; }
        .qty-low { color: #e53935; font-weight: bold; }
        .qty-ok { color: #2e7d32; font-weight: bold; }
        .pagination { display: flex; gap: 8px; margin-top: 16px; align-items: center; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
            background: #1a73e8; color: white; font-size: 13px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .page-info { font-size: 13px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📦 Stock Dashboard - Easy Accounting</h1>
        <div class="status" id="status">Memuat data...</div>
    </div>
    <div class="container">
        <input type="text" class="search-box" id="search" placeholder="🔍 Cari No. Barang atau Deskripsi...">
        <table>
            <thead>
                <tr>
                    <th>No. Barang</th>
                    <th>Deskripsi</th>
                    <th>Deskripsi 2</th>
                    <th>Jumlah</th>
                    <th>Satuan</th>
                    <th>Tipe</th>
                    <th>Kategori</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="7" style="text-align:center;padding:40px;color:#999">Memuat data...</td></tr>
            </tbody>
        </table>
        <div class="pagination">
            <button class="btn" id="btnPrev" onclick="prevPage()" disabled>← Prev</button>
            <span class="page-info" id="pageInfo">-</span>
            <button class="btn" id="btnNext" onclick="nextPage()">Next →</button>
        </div>
    </div>

    <script>
        let currentOffset = 0;
        const limit = 50;
        let currentSearch = "";
        let searchTimer = null;

        async function loadData() {
            document.getElementById("status").textContent = "Memuat...";
            const url = `/api/stock?search=${encodeURIComponent(currentSearch)}&offset=${currentOffset}&limit=${limit}`;
            const res = await fetch(url);
            const data = await res.json();
            renderTable(data);
            document.getElementById("status").textContent =
                `Menampilkan ${currentOffset + 1}–${currentOffset + data.length} | Update otomatis setiap 5 detik`;
            document.getElementById("pageInfo").textContent =
                `Halaman ${Math.floor(currentOffset / limit) + 1} (${data.length} item)`;
            document.getElementById("btnPrev").disabled = currentOffset === 0;
            document.getElementById("btnNext").disabled = data.length < limit;
        }

        function renderTable(data) {
            const tbody = document.getElementById("tableBody");
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:#999">Tidak ada data</td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td><b>${item.itemno}</b></td>
                    <td>${item.description}</td>
                    <td>${item.description2}</td>
                    <td class="${item.quantity <= 0 ? 'qty-low' : 'qty-ok'}">${item.quantity.toFixed(2)}</td>
                    <td>${item.unit}</td>
                    <td><span class="badge badge-${item.type}">${item.type || '-'}</span></td>
                    <td>${item.category}</td>
                </tr>
            `).join("");
        }

        function prevPage() {
            if (currentOffset >= limit) {
                currentOffset -= limit;
                loadData();
            }
        }

        function nextPage() {
            currentOffset += limit;
            loadData();
        }

        document.getElementById("search").addEventListener("input", (e) => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                currentSearch = e.target.value;
                currentOffset = 0;
                loadData();
            }, 400);
        });

        // Auto refresh setiap 5 detik
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
